name: Bug Report
description: Report a bug in OpenAutoMapper
title: "[Bug]: "
labels: ["bug", "triage"]
body:
  - type: markdown
    attributes:
      value: |
        Thanks for reporting a bug! Please fill out the information below to help us investigate.
  - type: textarea
    id: description
    attributes:
      label: Description
      description: A clear description of the bug.
    validations:
      required: true
  - type: textarea
    id: repro
    attributes:
      label: Steps to Reproduce
      description: Minimal code or steps to reproduce the issue.
      placeholder: |
        1. Create a profile with `CreateMap<Source, Dest>()`
        2. Build the project
        3. See error...
    validations:
      required: true
  - type: textarea
    id: expected
    attributes:
      label: Expected Behavior
      description: What you expected to happen.
    validations:
      required: true
  - type: textarea
    id: actual
    attributes:
      label: Actual Behavior
      description: What actually happened. Include error messages, generated code, or diagnostic output.
    validations:
      required: true
  - type: input
    id: version
    attributes:
      label: OpenAutoMapper Version
      placeholder: "1.0.0"
    validations:
      required: true
  - type: dropdown
    id: dotnet-version
    attributes:
      label: .NET Version
      options:
        - .NET 8
        - .NET 9
        - .NET 10
    validations:
      required: true
  - type: dropdown
    id: os
    attributes:
      label: Operating System
      options:
        - Windows
        - macOS
        - Linux
    validations:
      required: true
  - type: textarea
    id: generated-code
    attributes:
      label: Generated Code (if applicable)
      description: Paste the relevant generated code from `obj/Generated/OpenAutoMapper.Generator/`
      render: csharp
