name: Release

on:
  push:
    tags: ['v*']

permissions:
  contents: write
  packages: write
  id-token: write

env:
  DOTNET_NOLOGO: true
  DOTNET_CLI_TELEMETRY_OPTOUT: true
  DOTNET_SKIP_FIRST_TIME_EXPERIENCE: true

jobs:
  release:
    name: Build, Test & Publish
    runs-on: ubuntu-latest
    environment: production
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '10.0.x'

      - name: Extract version from tag
        run: echo "VERSION=${GITHUB_REF#refs/tags/v}" >> $GITHUB_ENV

      - name: Restore
        run: dotnet restore

      - name: Build
        run: dotnet build --no-restore -c Release

      - name: Test
        run: dotnet test --no-build -c Release

      - name: Pack
        run: |
          PACK_OPTS="-c Release /p:Version=${{ env.VERSION }} /p:ContinuousIntegrationBuild=true /p:Deterministic=true --no-build -o nupkg/"
          dotnet pack src/OpenAutoMapper.Abstractions/ $PACK_OPTS
          dotnet pack src/OpenAutoMapper.Core/ $PACK_OPTS
          dotnet pack src/OpenAutoMapper/ $PACK_OPTS
          dotnet pack src/OpenAutoMapper.DependencyInjection/ $PACK_OPTS
          dotnet pack src/OpenAutoMapper.Generator/ $PACK_OPTS || true
          echo "Packages created:"
          ls -la nupkg/

      - name: Generate SBOM
        run: |
          dotnet tool install -g Microsoft.Sbom.DotNetTool || true
          sbom-tool generate \
            -b nupkg/ \
            -bc src/ \
            -pn OpenAutoMapper \
            -pv ${{ env.VERSION }} \
            -ps "OpenAutoMapper" \
            -nsb https://github.com/ivahno/openmapper || echo "SBOM generation skipped"

      - name: NuGet Login (Trusted Publishing via OIDC)
        uses: nuget/login@v1
        with:
          user: ivahno

      - name: Push to NuGet
        run: >
          dotnet nuget push "nupkg/*.nupkg"
          --source nuget
          --skip-duplicate

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            nupkg/*.*nupkg
            nupkg/_manifest/**
          generate_release_notes: true
