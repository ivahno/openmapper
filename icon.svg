<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="512" height="512">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#1a1a2e"/>
      <stop offset="100%" stop-color="#16213e"/>
    </linearGradient>
    <linearGradient id="arrow" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#0ea5e9"/>
      <stop offset="100%" stop-color="#6366f1"/>
    </linearGradient>
    <linearGradient id="boxLeft" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#38bdf8"/>
      <stop offset="100%" stop-color="#0ea5e9"/>
    </linearGradient>
    <linearGradient id="boxRight" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#818cf8"/>
      <stop offset="100%" stop-color="#6366f1"/>
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="4" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  <!-- Background rounded square -->
  <rect width="512" height="512" rx="96" ry="96" fill="url(#bg)"/>

  <!-- Source object (left box with lines) -->
  <g transform="translate(72, 136)">
    <!-- Box outline -->
    <rect x="0" y="0" width="130" height="160" rx="12" ry="12"
          fill="none" stroke="url(#boxLeft)" stroke-width="4" opacity="0.9"/>
    <!-- Property lines inside box -->
    <rect x="20" y="28" width="60" height="8" rx="4" fill="#38bdf8" opacity="0.7"/>
    <rect x="20" y="52" width="90" height="8" rx="4" fill="#38bdf8" opacity="0.5"/>
    <rect x="20" y="76" width="50" height="8" rx="4" fill="#38bdf8" opacity="0.7"/>
    <rect x="20" y="100" width="75" height="8" rx="4" fill="#38bdf8" opacity="0.5"/>
    <rect x="20" y="124" width="40" height="8" rx="4" fill="#38bdf8" opacity="0.7"/>
  </g>

  <!-- Destination object (right box with lines) -->
  <g transform="translate(310, 136)">
    <!-- Box outline -->
    <rect x="0" y="0" width="130" height="160" rx="12" ry="12"
          fill="none" stroke="url(#boxRight)" stroke-width="4" opacity="0.9"/>
    <!-- Property lines inside box -->
    <rect x="20" y="28" width="60" height="8" rx="4" fill="#818cf8" opacity="0.7"/>
    <rect x="20" y="52" width="90" height="8" rx="4" fill="#818cf8" opacity="0.5"/>
    <rect x="20" y="76" width="50" height="8" rx="4" fill="#818cf8" opacity="0.7"/>
    <rect x="20" y="100" width="75" height="8" rx="4" fill="#818cf8" opacity="0.5"/>
    <rect x="20" y="124" width="40" height="8" rx="4" fill="#818cf8" opacity="0.7"/>
  </g>

  <!-- Mapping arrow (center) -->
  <g filter="url(#glow)">
    <!-- Arrow shaft -->
    <line x1="215" y1="216" x2="290" y2="216"
          stroke="url(#arrow)" stroke-width="6" stroke-linecap="round"/>
    <!-- Arrow head -->
    <polygon points="295,216 278,204 278,228"
             fill="url(#arrow)"/>
  </g>

  <!-- Gear/cog accent (compile-time generation symbol) -->
  <g transform="translate(256, 216)" opacity="0.15">
    <circle cx="0" cy="0" r="52" fill="none" stroke="#38bdf8" stroke-width="3"/>
    <!-- Gear teeth (8 teeth) -->
    <g stroke="#38bdf8" stroke-width="5" stroke-linecap="round">
      <line x1="0" y1="-56" x2="0" y2="-64"/>
      <line x1="39.6" y1="-39.6" x2="45.2" y2="-45.2"/>
      <line x1="56" y1="0" x2="64" y2="0"/>
      <line x1="39.6" y1="39.6" x2="45.2" y2="45.2"/>
      <line x1="0" y1="56" x2="0" y2="64"/>
      <line x1="-39.6" y1="39.6" x2="-45.2" y2="45.2"/>
      <line x1="-56" y1="0" x2="-64" y2="0"/>
      <line x1="-39.6" y1="-39.6" x2="-45.2" y2="-45.2"/>
    </g>
  </g>

  <!-- "OAM" text -->
  <text x="256" y="380" text-anchor="middle"
        font-family="system-ui, -apple-system, 'Segoe UI', sans-serif"
        font-weight="700" font-size="52" letter-spacing="6"
        fill="#e2e8f0">OAM</text>

  <!-- Tagline -->
  <text x="256" y="414" text-anchor="middle"
        font-family="system-ui, -apple-system, 'Segoe UI', sans-serif"
        font-weight="400" font-size="16" letter-spacing="3"
        fill="#64748b">AOT-FIRST MAPPER</text>
</svg>
